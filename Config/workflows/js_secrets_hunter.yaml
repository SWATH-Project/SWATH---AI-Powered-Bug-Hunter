# SWATH Workflow: JS Secrets Hunter
# JavaScript and secrets focused reconnaissance
#
# Strategy:
# - Passive recon for subdomain enumeration
# - Live host discovery
# - Deep JS crawling with katana in JS mode
# - Secrets scanning with gitleaks + trufflehog
# - Focus on extracting secrets, API keys, tokens from JavaScript files
# - Ideal for: modern SPAs, React/Angular/Vue apps, JS-heavy targets

meta:
  name: "JS Secrets Hunter"
  description: "JavaScript and secrets focused reconnaissance. Extract API keys, tokens, endpoints from JS."
  author: "SWATH Workflows"
  version: "1.0"
  estimated_time: "40 minutes"
  use_case: "Modern SPAs, React/Angular/Vue apps, JS-heavy targets, secret leakage hunting"

workflow:
  phases: [1, 2, 3, 5]
  profile: ghost

  phase_overrides:
    phase_2_secrets_osint:
      tools:
        - gitleaks
        - trufflehog

    phase_5_enumeration:
      tools:
        - tool: katana
          config:
            js_crawl: true
            depth: 5
            headless: false
            concurrency: 10
            rate_limit: 100
        - gau
        - paramspider

budget:
  enabled: true
  max_requests_total: 4000
  action_on_exceeded: "warn"

timeout:
  max_total_minutes: 40

global_defaults:
  timeout: 300
  retries: 1
  rate_limit: 60
