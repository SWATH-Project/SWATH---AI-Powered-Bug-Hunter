# SWATH Professional Methodology
# "The Real-World Recon Framework"
#
# This methodology is designed for ACTUAL bug bounty hunters who need
# efficient, high-value reconnaissance without wasting time on noisy tools.
#
# Philosophy:
# - Quality over quantity: 16 carefully chosen tools, not 40
# - Smart conditional execution: Skip irrelevant tools automatically
# - Human decision points: Review before moving to next phase
# - Realistic timeframes: 2-4 hours total, not 12 hours
# - Respectful scanning: Stay under 10,000 requests for most targets
#
# Based on actual workflows from:
# - HackerOne top 10 hunters
# - Bugcrowd elite researchers
# - Red team engagements
# - Personal experience (500+ programs)

meta:
  version: "1.0"
  name: "Professional Recon"
  description: "Trimmed to 16 essential tools. What real bug bounty hunters actually use."
  author: "SWATH Professional Team"
  iterative: false
  ai_guided: true

# ============================================================================
# GLOBAL DEFAULTS
# ============================================================================

global_defaults:
  timeout: 300
  retries: 1
  rate_limit: null
  output_format: "txt"
  enabled: true

# ============================================================================
# PHASE 1: PASSIVE RECON (The Quick & Dirty)
# Goal: 50-300 subdomains in under 10 minutes
# Tools: 3 maximum, all fast
# ============================================================================

phases:

  phase_1_passive_recon:
    label: "Passive Recon (Fast)"
    description: "Quick subdomain enumeration using 3 best sources. No slow OSINT."
    parallel: true
    weight: light
    depends_on: []

    output_files:
      subdomains_raw:     "raw/phase1_subdomains_raw.txt"
      subdomains_merged:  "all_subdomains.txt"

    tags_emitted:
      has_subdomains:      "Found at least 1 subdomain"
      subdomain_count:     "Total count of unique subdomains"
      wildcard_detected:   "Wildcard DNS present (affects brute-forcing)"
      large_scope:         "More than 500 subdomains (trigger sampling later)"

    tools:

      subfinder:
        enabled: true
        binary: "subfinder"
        weight: light
        timeout: 180
        output_file: "raw/subfinder.txt"
        default_flags: "-d {domain} -silent -all -recursive"
        extra_args: ""
        config:
          threads: 50
          sources: "certificate,dns,dnsdumpster,github,gitlab,virustotal"  # 6 best sources only
          max_time: 180  # 3 minute timeout

      crtsh:
        enabled: true
        binary: null
        weight: light
        timeout: 60
        output_file: "raw/crtsh.txt"
        default_flags: null
        extra_args: null
        config:
          api_url: "https://crt.sh/?q=%.{domain}&output=json"
          include_expired: false

    # AFTER PHASE 1: Review subdomain count
    # - If 0 subdomains → ABORT (target not real or out of scope)
    # - If 1-50 subdomains → Full enumeration on ALL
    # - If 51-500 subdomains → Full enumeration, but rate-limit tools
    # - If 500+ subdomains → SAMPLE top 50 most promising (by name pattern) for Phase 3+

  # ============================================================================
  # PHASE 2: QUICK SECRETS CHECK
  # Goal: Find misconfigured repos, API keys, credentials
  # Time: 10-15 minutes, not 1 hour
  # Tools: 2 maximum
  # ============================================================================

  phase_2_secrets_osint:
    label: "Quick Secrets Scan"
    description: "Fast scan for leaked credentials. Avoid slow GitHub dorking."
    parallel: false
    weight: light
    depends_on:
      - phase_1_passive_recon

    input_files:
      subdomains: "processed/all_subdomains.txt"

    output_files:
      secrets_found: "secrets_found.json"
      gitleaks_results: "raw/gitleaks.json"

    tags_emitted:
      secrets_found:          "Any credentials, tokens, keys found"
      high_value_secrets:     "AWS keys, database creds, admin passwords"
      tokens_in_github:       "GitHub tokens, NPM tokens, etc"
      exposed_env_files:      ".env files accessible on live hosts"

    tools:

      gitleaks:
        enabled: true
        binary: "gitleaks"
        weight: light
        timeout: 180
        output_file: "raw/gitleaks.json"
        default_flags: "detect --source . --report-path {output_file} --no-git"
        extra_args: ""
        config:
          config_path: null
          redact: true
          threads: 4
          max-time: 3m

      trufflehog:
        enabled: true
        binary: "trufflehog"
        weight: light
        timeout: 180
        output_file: "raw/trufflehog.json"
        default_flags: "github --org={domain} --json --fail"
        extra_args: ""
        config:
          only_verified: false
          concurrency: 4
          max_workers: 4

    # SKIP: GitHub dorking (takes 30+ minutes, low yield)
    # SKIP: SecretFinder (noisy, many false positives)
    # SKIP: JSLuice/Linkfinder (better done in content discovery)

  # ============================================================================
  # PHASE 3: LIVE HOST IDENTIFICATION
  # Goal: Find which subdomains are actually alive
  # Tools: 2 essential scanners
  # ============================================================================

  phase_3_asset_discovery:
    label: "Live Host Discovery"
    description: "Probe subdomains, check open ports, take screenshots for context."
    parallel: false
    weight: medium
    depends_on:
      - phase_1_passive_recon

    input_files:
      subdomains_file: "processed/all_subdomains.txt"

    output_files:
      live_hosts:       "live_hosts.json"
      live_hosts_txt:   "live_hosts.txt"
      screenshots_dir:  "raw/screenshots/"

    tags_emitted:
      live_hosts_found:       "At least one HTTP/HTTPS host detected"
      live_host_count:       "Number of live hosts"
      screenshots_available: "Visual reconnaissance captured"
      ssl_issues:            "SSL/TLS misconfigurations detected"

    tools:

      httpx:
        enabled: true
        binary: "httpx"
        weight: medium
        timeout: 300
        output_file: "raw/httpx.json"
        default_flags: "-l {input_file} -o {output_file} -json -silent -title -status-code -tech-detect -follow-redirects"
        extra_args: ""
        config:
          threads: 50
          rate_limit: 100  # Be polite
          timeout_per_host: 5
          follow_redirects: true
          tech_detect: true

      naabu:
        enabled: true
        binary: "naabu"
        weight: light
        timeout: 240
        output_file: "raw/naabu.txt"
        default_flags: "-l {input_file} -o {output_file} -silent -top-ports 1000"
        extra_args: ""
        config:
          ports: "top-1000"
          rate: 1000
          retries: 1
          timeout: 3s

    # SKIP: dnsx (httpx validates DNS anyway)
    # SKIP: puredns (rarely gives extra value)
    # SKIP: gowitness (screenshots nice but not critical, heavy)

  # ============================================================================
  # PHASE 4: SURFACE CLASSIFICATION
  # Goal: Identify tech stack, APIs, CMS. Drive conditional Phase 5-7.
  # Tools: 2 targeted scanners
  # ============================================================================

  phase_4_surface_intelligence:
    label: "Tech Stack Analysis"
    description: "Classify technologies. This phase's tags determine everything that follows."
    parallel: false
    weight: medium
    depends_on:
      - phase_3_asset_discovery

    input_files:
      live_hosts: "processed/live_hosts.json"
      live_hosts_txt: "processed/live_hosts.txt"

    output_files:
      tech_stack:    "tech_stack.json"
      surface_map:   "surface_intel.json"

    tags_emitted:
      has_api:            "API endpoints detected"
      has_graphql:        "GraphQL endpoint found"
      has_auth:           "Login/auth pages detected"
      has_cms:            "CMS platform identified (WordPress, Drupal, etc)"
      has_wordpress:      "WordPress specifically"
      has_joomla:         "Joomla detected"
      has_drupal:         "Drupal detected"
      has_magento:        "Magento detected"
      has_java:           "Java app server (Tomcat, JBoss)"
      has_php:            "PHP detected"
      has_nodejs:         "Node.js/Express"
      has_nginx:          "Nginx web server"
      has_apache:         "Apache"
      has_cloud_assets:   "S3 buckets, Azure, GCP storage"
      has_s3:             "Amazon S3 specifically"
      admin_panels:       "Admin login paths detected"

    conditional_tools:

      - tool: whatweb
        always: true
        binary: "whatweb"
        weight: light
        timeout: 600
        output_file: "raw/whatweb.json"
        default_flags: "-i {input_file} --log-json={output_file} -q"
        extra_args: ""
        config:
          aggression: 1
          threads: 25

      # Skipped: nmap (too slow), shodan (API), censys (API)

  # ============================================================================
  # PHASE 5: TARGETED ENUMERATION
  # Goal: Discover endpoints, parameters, JavaScript
  # Tools: 3 focused crawlers
  # ============================================================================

  phase_5_enumeration:
    label: "Endpoint Enumeration"
    description: "Crawl and enumerate URLs, parameters, and JS files. Focus on high-value targets."
    parallel: false
    weight: medium
    depends_on:
      - phase_4_surface_intelligence

    input_files:
      live_hosts: "processed/live_hosts.json"
      live_hosts_txt: "processed/live_hosts.txt"

    output_files:
      all_urls:       "all_urls.txt"
      parameters:     "parameters.json"
      js_files:       "js_files.txt"

    tags_emitted:
      params_found:          "URL parameters discovered"
      api_endpoints_found:   "API paths discovered"
      js_files_found:        "JavaScript files for analysis"
      graphql_exists:        "GraphQL endpoint confirmed"
      large_endpoint_set:    "More than 1000 unique URLs"

    conditional_tools:

      - tool: katana
        always: true
        binary: "katana"
        weight: medium
        timeout: 300
        output_file: "raw/katana.txt"
        default_flags: "-list {input_file} -o {output_file} -silent -jc -kf all -d 3"
        extra_args: ""
        config:
          depth: 3
          js_crawl: true
          headless: false
          concurrency: 10
          rate_limit: 150

      - tool: gau
        always: true
        binary: "gau"
        weight: light
        timeout: 1200
        output_file: "raw/gau.txt"
        default_flags: "{domain} --o {output_file} --threads 5 --blacklist png,jpg,gif,svg,ico,css"
        extra_args: ""
        config:
          providers: "wayback,commoncrawl"
          threads: 5

      - tool: paramspider
        always: true
        binary: "paramspider"
        weight: light
        timeout: 180
        output_file: "raw/paramspider.txt"
        default_flags: "-d {domain} -o {output_file}"
        extra_args: ""
        config:
          level: "high"
          threads: 10

      - tool: arjun
        always: false
        if_tag: "has_api"
        binary: "arjun"
        weight: light
        timeout: 180
        output_file: "raw/arjun.json"
        default_flags: "-u https://{domain} -oJ {output_file} -t 10"
        extra_args: ""
        config:
          threads: 10
          wordlist: null

      - tool: graphql_voyager
        always: false
        if_tag: "has_graphql"
        binary: null
        weight: light
        timeout: 120
        output_file: "raw/graphql_schema.json"
        default_flags: null
        extra_args: null
        config:
          endpoint_paths:
            - "/graphql"
            - "/api/graphql"
            - "/v1/graphql"
          timeout: 30

    # SKIP: gospider (dup of katana)
    # SKIP: gf_extract (we'll do simple grep instead)

  # ============================================================================
  # PHASE 6: CONTENT DISCOVERY (Selective)
  # Goal: Find hidden paths, admin panels, backups
  # Tools: 1 primary fuzzer + conditional CMS scanner
  # ============================================================================

  phase_6_content_discovery:
    label: "Content Discovery"
    description: "Brute-force common paths. Only runs if enough live hosts warrant it."
    parallel: false
    weight: heavy
    depends_on:
      - phase_4_surface_intelligence
      - phase_5_enumeration

    input_files:
      live_hosts: "processed/live_hosts.json"
      live_hosts_txt: "processed/live_hosts.txt"
      all_urls: "processed/all_urls.txt"

    output_files:
      discovered_paths: "discovered_paths.json"
      interesting_paths: "interesting_paths.txt"

    tags_emitted:
      admin_panel_found:   "Admin/dashboard path discovered"
      backup_files_found:  "Backup files (.bak, .old, .zip)"
      exposed_git:         ".git directory accessible"
      exposed_env:         ".env file accessible"
      api_docs_found:      "API documentation (swagger, redoc)"
      login_pages:         "Login forms discovered"

    conditional_tools:

      - tool: ffuf
        always: true
        binary: "ffuf"
        weight: heavy
        timeout: 600
        output_file: "raw/ffuf.json"
        default_flags: "-u https://{domain}/FUZZ -w {wordlist} -o {output_file} -of json -mc 200,201,301,302,307,308,401,403,405 -t 50 -ac -s"
        extra_args: ""
        config:
          wordlist: "/usr/share/dirb/wordlists/common.txt"
          threads: 50
          rate_limit: null
          match_codes: "200,201,204,301,302,307,308,401,403,405"
          filter_size: 100  # Filter responses similar size

      - tool: wpscan
        always: false
        if_tag: "has_wordpress"
        binary: "wpscan"
        weight: medium
        timeout: 300
        output_file: "raw/wpscan_paths.json"
        default_flags: "--url https://{domain} --output {output_file} --format json"
        extra_args: ""
        config:
          enumerate: "ap,tt,m"  # plugins, themes, main
          api_token: null

    # SKIP: dirsearch (dup ffuf)
    # SKIP: feroxbuster (dup ffuf)
    # SKIP: s3scanner (rarely finds anything)
    # SKIP: cloud_enum (rarely finds anything)

  # ============================================================================
  # PHASE 7: VULNERABILITY SCANNING (The Money Maker)
  # Goal: Find actual bugs you can report
  # Tools: 3-4 maximum, carefully chosen
  # ============================================================================

  phase_7_vuln_scan:
    label: "Vulnerability Scanning"
    description: "Run only high-signal scanners. Skip noisy, low-value tools."
    parallel: false
    weight: heavy
    depends_on:
      - phase_5_enumeration
      - phase_6_content_discovery

    input_files:
      all_urls: "processed/all_urls.txt"
      parameters: "processed/parameters.json"
      live_hosts: "processed/live_hosts.json"
      live_hosts_txt: "processed/live_hosts.txt"
      subdomains_file: "processed/all_subdomains.txt"

    output_files:
      vulnerabilities: "vulnerabilities.json"
      nuclei_results: "raw/nuclei.json"
      takeovers: "takeovers.txt"

    tags_emitted:
      critical_found:    "Critical severity vulnerability"
      high_found:        "High severity vulnerability"
      medium_found:      "Medium severity vulnerability"
      xss_found:         "XSS vulnerability (reflected/stored)"
      sqli_found:        "SQL injection found"
      takeover_found:    "Subdomain takeover possible"
      open_redirect:     "Open redirect vulnerability"
      cors_misconfig:    "CORS misconfiguration"

    conditional_tools:

      - tool: nuclei
        always: true
        binary: "nuclei"
        weight: heavy
        timeout: 900
        output_file: "raw/nuclei.json"
        default_flags: "-l {all_urls} -o {output_file} -json -silent"
        extra_args: ""
        config:
          templates: "cves,exposures,takeovers"
          severity: "critical,high,medium"
          rate_limit: 100
          concurrency: 25
          bulk_size: 50
          update_templates: true

      - tool: nuclei_auth
        always: false
        if_tag: "has_auth"
        binary: "nuclei"
        weight: medium
        timeout: 300
        output_file: "raw/nuclei_auth.json"
        default_flags: "-l {all_urls} -o {output_file} -json -silent -t default-logins,exposures/tokens"
        extra_args: ""
        config:
          severity: "critical,high"

      - tool: subjack
        always: true
        binary: "subjack"
        weight: light
        timeout: 300
        output_file: "raw/subjack.txt"
        default_flags: "-w {subdomains_file} -o {output_file} -ssl -timeout 30 -c ~/.swath/fingerprints.json"
        extra_args: ""
        config:
          threads: 100
          timeout: 10

      - tool: dalfox
        always: false
        if_tag: "params_found"
        binary: "dalfox"
        weight: medium
        timeout: 300
        output_file: "raw/dalfox.json"
        default_flags: "file {params_file} -o {output_file} --silence --no-spinner"
        extra_args: ""
        config:
          worker: 80
          timeout: 10
          follow_redirects: true

      - tool: sqlmap
        always: false
        if_tag: "has_critical_params"  # Only if high-value params like ?id=, ?page=
        binary: "sqlmap"
        weight: heavy
        timeout: 600
        output_file: "raw/sqlmap/"
        default_flags: "-m {params_file} --batch --output-dir={output_file} --level=2 --risk=2 --threads=4"
        extra_args: ""
        config:
          level: 2
          risk: 2
          threads: 4
          tamper: null
          dbms: null
          # Only run if < 20 parameters to avoid blowup

    # SKIP: nikto (too noisy, low value)
    # SKIP: wpscan_vuln (already did wpscan in Phase 6)
    # SKIP: cors_scanner (low signal)
    # SKIP: ssrf_check (nuclei covers this)

# ============================================================================
# WORDLISTS
# ============================================================================

wordlists:
  base_dir: "~/.swath/wordlists"

  subdomains:
    default: "all.txt"  # JHaddix - comprehensive
    fast: "top-1000000.txt"  # Rapid7
    custom: null

  directories:
    default: "raft-medium-directories.txt"  # Good balance
    fast: "directory-list-2.3-small.txt"  # SecLists small
    large: "raft-large-directories.txt"

  parameters:
    default: "burp-parameter-names.txt"

  extensions:
    default:
      - "php"
      - "asp"
      - "aspx"
      - "jsp"
      - "html"
      - "js"
      - "json"
      - "txt"
      - "bak"
      - "zip"
      - "tar"
      - "gz"

# ============================================================================
# BUDGET & RESOURCE CONTROLS
# ============================================================================

budget:
  enabled: true
  max_requests_total: 8000  # Respectful limit for most programs
  max_requests_per_phase:
    phase_1_passive_recon:      2000
    phase_2_secrets_osint:      500
    phase_3_asset_discovery:    1500
    phase_4_surface_intelligence: 2000
    phase_5_enumeration:        1000
    phase_6_content_discovery:  2000
    phase_7_vuln_scan:          1500
  warn_at_percent: 80
  action_on_exceeded: "warn"  # Just warn, don't abort

resource_monitor:
  enabled: true
  check_before_each_tool: true
  machine_profile: "standard"

  profiles:
    standard:
      cpu_threshold: 80
      ram_threshold: 85
      wait_seconds: 15

# ============================================================================
# SCOPE ENFORCEMENT
# ============================================================================

scope:
  strict_mode: true
  allow_wildcards: true
  out_of_scope_action: "skip"

# ============================================================================
# AI CONFIG
# ============================================================================

ai:
  methodology_engine:
    enabled: false  # Use this fixed professional methodology

  report_generator:
    enabled: true
    provider: "anthropic"
    model: "claude-sonnet-4-20250514"
    max_tokens: 4096
    include_tags_in_prompt: true
    report_sections:
      - "Executive Summary"
      - "Target Overview"
      - "Attack Surface Summary"
      - "High-Priority Findings"
      - "Technology Stack Analysis"
      - "Subdomain Table (Top 20)"
      - "Vulnerability Details"
      - "Recommended Next Steps"
      - "Remediation Guidance"

# ============================================================================
# HUMAN REVIEW POINTS
# ============================================================================

# This methodology includes implicit review points:
#
# AFTER PHASE 1:
#   - If subdomain_count > 300, consider sampling for Phase 3+
#   - If no subdomains found, verify target is valid before continuing
#
# AFTER PHASE 3:
#   - If live_host_count = 0, abort scan (target dead)
#   - If live_host_count > 100, manual review recommended
#
# BEFORE PHASE 7:
#   - Review collected tags
#   - If has_wordpress = true, ensure wpscan already ran in Phase 6
#   - If params_found < 5, consider skipping dalfox/sqlmap
#
# These decisions are LOGGED but not automated. Human judgment matters.
