# SWATH Workflow: Subdomain Takeover
# Focused subdomain takeover hunting
#
# Strategy:
# - Enumerate all subdomains via passive recon
# - Probe for live hosts
# - Run subjack for CNAME dangling checks
# - Run nuclei with takeover-specific templates only
# - Minimal budget — this is a targeted hunt

meta:
  name: "Subdomain Takeover"
  description: "Focused subdomain takeover hunting with CNAME analysis."
  author: "SWATH Workflows"
  version: "1.0"
  estimated_time: "20 minutes"
  use_case: "Subdomain takeover bounty hunting, orphaned DNS detection"

workflow:
  phases: [1, 3, 7]
  profile: ghost

  phase_overrides:
    phase_7_vuln_scan:
      tools:
        - subjack
        - tool: nuclei
          config:
            templates: "takeovers"
            severity: "critical,high,medium"

budget:
  enabled: true
  max_requests_total: 2000
  action_on_exceeded: "abort"

timeout:
  max_total_minutes: 20

global_defaults:
  timeout: 180
  retries: 1
  rate_limit: 50
