# Phase weight classification for scheduling decisions
phase_weights:
  phase_1_passive_recon:
    weight: "light"
    max_concurrent_light_hw: 6       # On high-end (16GB+)
    max_concurrent_medium_hw: 4      # On medium (8GB)
    max_concurrent_low_hw: 3         # On low-end (4GB)
    scheduler_strategy: "high_concurrency"  # Start all that fit

  phase_2_secrets_osint:
    weight: "light"
    max_concurrent_light_hw: 4
    max_concurrent_medium_hw: 3
    max_concurrent_low_hw: 2
    scheduler_strategy: "high_concurrency"

  phase_3_asset_discovery:
    weight: "medium"
    max_concurrent_light_hw: 4
    max_concurrent_medium_hw: 2
    max_concurrent_low_hw: 1
    scheduler_strategy: "adaptive_with_throttle"

  phase_4_surface_intelligence:
    weight: "medium"
    max_concurrent_light_hw: 3
    max_concurrent_medium_hw: 2
    max_concurrent_low_hw: 1
    scheduler_strategy: "adaptive_with_throttle"

  phase_5_enumeration:
    weight: "heavy"
    max_concurrent_light_hw: 2
    max_concurrent_medium_hw: 1
    max_concurrent_low_hw: 1
    scheduler_strategy: "adaptive_sequential"

  phase_6_content_discovery:
    weight: "very_heavy"
    max_concurrent_light_hw: 1
    max_concurrent_medium_hw: 1
    max_concurrent_low_hw: 1
    scheduler_strategy: "adaptive_sequential"

  phase_7_vuln_scan:
    weight: "very_heavy"
    max_concurrent_light_hw: 1
    max_concurrent_medium_hw: 1
    max_concurrent_low_hw: 1
    scheduler_strategy: "adaptive_sequential_with_params_scaling"

# Resource thresholds for adaptive behavior
resource_thresholds:
  ram_critical_percent: 85      # Above this, throttle aggressively
  ram_high_percent: 75          # Above this, pause new tools
  ram_normal_percent: 60        # Normal operating zone
  cpu_critical_percent: 90
  cpu_high_percent: 80
  swap_usage_warning_percent: 50  # If swap > 50%, treat as memory pressure
  user_activity_idle_seconds: 300  # Consider user idle after 5 min
  safety_margin_percent: 20     # Always reserve 20% RAM for OS
